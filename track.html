<!DOCTYPE html>
<html>
<head>
    <title>Відстеження замовлення - 3DPrintCraft</title>
    <meta charset="UTF-8">
    <style>
    body { 
        background: #0a0a0a; 
        color: #ffff; 
        font-family: 'Segoe UI', sans-serif; 
        text-align: center; 
        padding: 50px 20px; 
    }

    .status-box { 
        background: #151515; 
        padding: 40px; 
        border-radius: 25px; 
        border: 2px solid #333; 
        display: inline-block; 
        min-width: 320px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    /* Основний колір статусу (помаранчевий за замовчуванням) */
    .status-badge { 
        background: #ff9500; 
        color: #000; 
        padding: 12px 25px; 
        border-radius: 12px; 
        font-weight: 800; 
        font-size: 22px; 
        display: inline-block;
        margin-bottom: 20px;
        text-transform: uppercase;
        box-shadow: 0 0 20px rgba(255, 149, 0, 0.3);
    }

    /* Кольори для конкретних статусів */
    .status-printing { background: #00d4ff; color: #000; box-shadow: 0 0 20px rgba(0, 212, 255, 0.4); } /* Блакитний для друку */
    .status-ready { background: #28a745; color: #fff; box-shadow: 0 0 20px rgba(40, 167, 69, 0.4); }   /* Зелений для готово */
    .status-delivery { background: #6f42c1; color: #fff; box-shadow: 0 0 20px rgba(111, 66, 193, 0.4); } /* Фіолетовий для дороги */

    .item-name { color: #aaa; font-size: 18px; margin: 15px 0; }
    .time-stamp { color: #555; font-size: 13px; }
</style>
</head>
<body>
    <h1>Твоє замовлення 📦</h1>
    <div id="loader">Завантаження статусу...</div>
    <div id="content" style="display:none;">
        <div class="status-box">
            <div id="status" class="status-badge">⏳ Перевірка...</div>
            <div id="item" class="item-name">Товар...</div>
            <p id="time" style="font-size: 12px; color: #555;"></p>
        </div>
    </div>
	<div style="margin-top: 30px;">
    <a href="index.html" style="text-decoration: none; color: #ff9500; border: 1px solid #ff9500; padding: 10px 20px; border-radius: 8px; font-weight: bold; transition: 0.3s;">
        ← Повернутися в магазин
    </a>
</div>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAban86otzMqDuk_XwnqADDNPHICU9tFFs",
            authDomain: "d-shop-status.firebaseapp.com",
            projectId: "d-shop-status",
            databaseURL: "https://d-shop-status-default-rtdb.europe-west1.firebasedatabase.app/",
            appId: "1:286708501499:web:eb82c5cf7f7f92746ed95e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Беремо номер телефону, який ми зберегли в кошику
        const phone = localStorage.getItem('tracked_phone');

        if (!phone) {
            document.getElementById('loader').innerText = "Номер телефону не знайдено. Зробіть замовлення спочатку!";
        } else {
            db.ref('orders/' + phone).on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('content').style.display = 'block';
                    document.getElementById('status').innerText = data.status;
                    document.getElementById('item').innerText = data.item;
                    document.getElementById('time').innerText = "Замовлено: " + data.time;
                } else {
                    document.getElementById('loader').innerText = "Замовлення для номеру " + phone + " ще не створено.";
                }
            });
        }
    </script>
</body>
</html>
